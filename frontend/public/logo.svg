<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad1)" opacity="0.2"/>
  
  <!-- Rupee Symbol -->
  <g transform="translate(200, 200)">
    <!-- Main Rupee Symbol -->
    <path d="M-40,-80 L40,-80 M-40,-50 L40,-50 M-40,-20 Q0,20 40,60 M-40,-80 L-40,20" 
          stroke="url(#grad1)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Trend Arrow -->
    <path d="M60,-60 L80,-40 L100,-80" 
          stroke="#10b981" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
